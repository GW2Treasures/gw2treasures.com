name: Test
on:
  workflow_call:


jobs:
  unit:
    name: Unit
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
    - name: Setup Node.js env
      uses: ./.github/actions/setup-node-env
      with:
        cache-key: test
    - name: Setup playwright
      # install chromium including system dependencies and without headless shell (we use the real browser in headless mode)
      run: pnpm exec playwright install chromium --with-deps --no-shell
    - name: Run Test
      run: pnpm run test
