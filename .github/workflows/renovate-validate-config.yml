name: Validate renovate config
on:
  workflow_call:

env:
  # renovate: datasource=npm packageName=renovate
  RENOVATE_VERSION: 43.261.3

jobs:
  validate-config:
    name: Validate config
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 24.18.0
        package-manager-cache: false
    - name: Validate config
      run: |
        pnpx \
          --allow-build=better-sqlite3@12.9.0 \
          --allow-build=core-js-pure@3.49.0 \
          --allow-build=dtrace-provider@0.8.8 \
          --allow-build=protobufjs@8.0.1 \
          --allow-build=re2@1.24.0 \
          --package=renovate@${{ env.RENOVATE_VERSION }} \
          renovate-config-validator --strict
