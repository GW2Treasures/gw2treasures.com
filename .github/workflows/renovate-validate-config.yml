name: Validate renovate config
on:
  workflow_call:

env:
  # renovate: datasource=npm packageName=renovate
  RENOVATE_VERSION: 43.261.3

jobs:
  validate-config:
    name: Validate config
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
    - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
      with:
        node-version: 24.18.0
        package-manager-cache: false
    - name: Validate config
      run: |
        pnpx \
          --allow-build=better-sqlite3@12.9.0 \
          --allow-build=core-js-pure@3.49.0 \
          --allow-build=dtrace-provider@0.8.8 \
          --allow-build=protobufjs@8.0.1 \
          --allow-build=re2@1.24.0 \
          --package=renovate@${{ env.RENOVATE_VERSION }} \
          renovate-config-validator --strict
