name: Validate renovate config
on:
  workflow_call:

env:
  # renovate: datasource=npm packageName=renovate
  RENOVATE_VERSION: 43.150.0

jobs:
  validate-config:
    name: Validate config
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Install pnpm
      uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 24.15.0
        package-manager-cache: false
    - name: Validate config
      run: |
        pnpx \
          --allow-build=better-sqlite3@12.9.0 \
          --allow-build=core-js-pure@3.49.0 \
          --allow-build=dtrace-provider@0.8.8 \
          --allow-build=protobufjs@8.0.1 \
          --allow-build=re2@1.24.0 \
          --package=renovate@${{ env.RENOVATE_VERSION }} \
          renovate-config-validator --strict
