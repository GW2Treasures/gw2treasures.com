name: Test
on:
  workflow_call:


jobs:
  unit:
    name: Unit
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        submodules: true
    - name: Setup Node.js env
      uses: ./.github/actions/setup-node-env
      with:
        cache-key: test
    - name: Setup playwright
      # install chromium including system dependencies and without headless shell (we use the real browser in headless mode)
      run: pnpm exec playwright install chromium --with-deps --no-shell
    - name: Run Test
      run: pnpm run test
