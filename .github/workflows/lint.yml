name: Lint
on:
  workflow_call:


jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        submodules: true
    - name: Setup Node.js env
      uses: ./.github/actions/setup-node-env
      with:
        cache-key: lint
    - name: Run Lint
      run: pnpm run lint
