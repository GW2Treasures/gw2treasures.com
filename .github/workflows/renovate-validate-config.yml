name: Validate renovate config
on:
  workflow_call:

env:
  # renovate: datasource=npm packageName=renovate
  RENOVATE_VERSION: 43.220.0

jobs:
  validate-config:
    name: Validate config
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.16.0
        package-manager-cache: false
    - name: Validate config
      run: |
        pnpx \
          --allow-build=better-sqlite3@12.9.0 \
          --allow-build=core-js-pure@3.49.0 \
          --allow-build=dtrace-provider@0.8.8 \
          --allow-build=protobufjs@8.0.1 \
          --allow-build=re2@1.24.0 \
          --package=renovate@${{ env.RENOVATE_VERSION }} \
          renovate-config-validator --strict
